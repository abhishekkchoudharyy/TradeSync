spring.application.name=tradesync

spring.datasource.url=jdbc:mysql://localhost:3306/abhishek_tradesync?createDatabaseIfNotExist=true   #change abhishek_tradesync to your database name liking. 
spring.datasource.username=root
spring.datasource.password=#password Here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# DeepSeek AI Configuration
spring.ai.deepseek.api-key=#deepseek-key Paste here
spring.ai.deepseek.chat.model=deepseek-chat

spring.ai.deepseek.chat.temperature=0.0

# Springdoc OpenAPI (Swagger) Configuration
springdoc.swagger-ui.path=/swagger-ui.html